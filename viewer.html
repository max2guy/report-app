<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="사역현황">
<meta name="theme-color" content="#0f2044">
<link rel="manifest" href="./viewer-manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>사역 현황 — 연천장로교회</title>
<style>
:root {
  --navy:#0f2044; --navy2:#1a3a7a; --blue:#2c5aa0;
  --gold:#c9a84c; --bg:#f0f4f8; --card:#fff;
  --text:#1a202c; --muted:#718096; --border:#e2e8f0;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  --sp:clamp(10px,3vw,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:clamp(13px,3.5vw,15px);line-height:1.5;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none}
*::-webkit-scrollbar{display:none}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:calc(10px + var(--safe-top)) var(--sp) 10px;
  color:#fff;position:sticky;top:0;z-index:50;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header h1{font-size:clamp(15px,4vw,18px);font-weight:700}
.header p{font-size:11px;opacity:.7;margin-top:1px}
.header-actions{display:flex;gap:6px}
.hdr-btn{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:6px 10px;font-size:12px;
  cursor:pointer;font-family:inherit;font-weight:500;
}
.header-tabs{display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:10px;padding:3px}
.h-tab{
  flex:1;padding:6px 4px;border:none;border-radius:8px;
  font-size:clamp(11px,3vw,13px);font-weight:600;font-family:inherit;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.6);transition:all .2s;
}
.h-tab.active{background:#fff;color:var(--navy)}

/* CONTENT */
.content{
  padding:var(--sp) var(--sp) calc(16px + var(--safe-bottom));
  max-width:520px;margin:0 auto;
}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CARD */
.card{
  background:var(--card);border-radius:14px;
  padding:clamp(11px,3vw,14px);margin-bottom:10px;
  box-shadow:0 2px 10px rgba(15,32,68,.07);
}
.card-title{
  font-size:11px;font-weight:600;color:var(--muted);
  letter-spacing:.3px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}

/* STAT ROW */
.latest-date{font-size:clamp(15px,4vw,18px);font-weight:700;color:var(--navy);margin-bottom:10px}
.stat-row{display:flex;gap:8px}
.stat-box{
  flex:1;text-align:center;background:#f7f9fc;
  border-radius:10px;padding:clamp(8px,2.5vw,11px) 6px;
}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:clamp(18px,5vw,22px);font-weight:700;color:var(--navy)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:1px}
.badge-rate{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:600;margin-top:8px;
}
.rate-good{background:#f0fff4;color:#276749}
.rate-mid{background:#fffbeb;color:#975a16}
.rate-low{background:#fff5f5;color:#c53030}

/* ABSENT NAMES */
.absent-block{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.absent-block-title{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500}
.name-chips{display:flex;flex-wrap:wrap;gap:5px}
.name-chip{
  background:#fff5f5;color:#c53030;border:1px solid #fecaca;
  border-radius:20px;padding:2px 9px;font-size:12px;font-weight:500;
}
.name-chip.none{background:#f0fff4;color:#276749;border-color:#9ae6b4}

/* ZONE ABSENT */
.zone-absent-list{display:flex;flex-direction:column;gap:8px}
.zone-row{background:#f7f9fc;border-radius:10px;padding:10px 12px}
.zone-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.zone-name{font-size:13px;font-weight:600;color:var(--navy)}
.zone-count{font-size:11px;color:#c53030;font-weight:600;background:#fff5f5;padding:2px 7px;border-radius:10px}
.district-title{
  font-size:12px;font-weight:700;color:var(--blue);
  margin:12px 0 7px;padding-left:8px;
  border-left:3px solid var(--blue);
}

/* CHART */
.chart-wrap{margin-top:2px}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-label{font-size:11px;color:var(--muted);width:40px;flex-shrink:0;text-align:right}
.chart-bar-bg{flex:1;height:20px;background:#eef2f8;border-radius:6px;overflow:hidden}
.chart-bar{
  height:100%;border-radius:6px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:6px;font-size:10px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:24px;
}
.bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.bar-adult{background:linear-gradient(90deg,#276749,#38a169)}

/* MONTHLY ANALYSIS */
.monthly-analysis{display:flex;flex-direction:column;gap:8px}
.ma-row{display:flex;align-items:center;gap:8px}
.ma-label{font-size:12px;font-weight:600;color:var(--navy);width:32px;flex-shrink:0}
.ma-bar-bg{flex:1;height:24px;background:#eef2f8;border-radius:6px;overflow:hidden}
.ma-bar{
  height:100%;border-radius:6px;
  display:flex;align-items:center;padding:0 8px;
  font-size:11px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:36px;white-space:nowrap;
}
.ma-bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.ma-bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.ma-bar-adult{background:linear-gradient(90deg,#276749,#38a169)}
.ma-meta{font-size:10px;color:var(--muted);width:44px;text-align:right;flex-shrink:0}

/* CONSECUTIVE ABSENT */
.consec-list{display:flex;flex-direction:column;gap:6px}
.consec-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff8f8;border:1px solid #fecaca;border-radius:8px;padding:7px 12px;
}
.consec-name{font-size:13px;font-weight:600}
.consec-badge{background:#e53e3e;color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}

/* HISTORY LIST */
.history-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);gap:8px;
}
.history-row:last-child{border-bottom:none}
.history-date{font-size:13px;color:var(--text);flex-shrink:0}
.history-right{display:flex;align-items:center;gap:8px}
.del-btn{
  background:none;border:none;color:#ccc;cursor:pointer;
  font-size:14px;padding:2px 4px;border-radius:4px;
  transition:color .15s;
}
.del-btn:hover,.del-btn:active{color:#e53e3e}

/* ADMIN PANEL */
.admin-panel{
  background:rgba(255,255,255,.12);border-radius:10px;
  padding:10px 12px;margin-top:10px;display:none;
}
.admin-panel.open{display:block}
.admin-panel input{
  width:100%;padding:6px 10px;border:1px solid rgba(255,255,255,.3);
  border-radius:7px;font-size:12px;margin-bottom:6px;
  background:rgba(255,255,255,.15);color:#fff;font-family:inherit;
}
.admin-panel input::placeholder{color:rgba(255,255,255,.5)}

/* EMPTY / SPINNER */
.empty{text-align:center;color:var(--muted);padding:32px 0;font-size:13px}
.spinner{display:flex;justify-content:center;align-items:center;height:100px}
.spinner::after{
  content:'';width:28px;height:28px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--blue);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MESSAGE INBOX */
.inbox-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.inbox-overlay.open{opacity:1;pointer-events:all}
.inbox-sheet{
  background:#fff;border-radius:20px 20px 0 0;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  width:100%;max-width:520px;max-height:80vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s;
}
.inbox-overlay.open .inbox-sheet{transform:translateY(0)}
.inbox-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 14px}
.inbox-title{font-size:15px;font-weight:700;color:#0f2044;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.inbox-compose textarea{
  width:100%;min-height:80px;padding:10px 12px;
  border:1px solid #e2e8f0;border-radius:10px;
  font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;margin-bottom:8px;
}
.inbox-send-btn{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#0f2044,#1a3a7a);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
}
.inbox-divider{border:none;border-top:1px solid #e2e8f0;margin:12px 0}
.inbox-section-title{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.inbox-item{
  background:#f7f9fc;border-radius:10px;padding:10px 12px;margin-bottom:7px;
}
.inbox-item.unread{background:#fffbeb;border-left:3px solid #c9a84c}
.inbox-item-meta{font-size:11px;color:#718096;margin-bottom:3px;display:flex;justify-content:space-between}
.inbox-item-text{font-size:13px;color:#1a202c;line-height:1.5}
.inbox-empty{font-size:12px;color:#718096;text-align:center;padding:20px 0}
/* HEADER BADGE */
.hdr-btn-wrap{position:relative;display:inline-flex}
.hdr-badge{
  position:absolute;top:-4px;right:-4px;
  background:#e53e3e;color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}

/* TOAST */
.toast{
  position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  background:#1a202c;color:#fff;padding:9px 18px;border-radius:22px;
  font-size:13px;font-weight:500;z-index:999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>⛪ 사역 현황</h1>
      <p>연천장로교회 교역자 주일 보고</p>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="toggleAdmin()">⚙️</button>
      <div class="hdr-btn-wrap">
        <button class="hdr-btn" onclick="openInbox()">💬</button>
        <span class="hdr-badge" id="viewerInboxBadge" style="display:none">0</span>
      </div>
      <button class="hdr-btn" onclick="loadData(true)">🔄</button>
    </div>
  </div>
  <!-- 관리자 패널 (토큰 입력) -->
  <div class="admin-panel" id="adminPanel">
    <input type="password" id="adminToken" placeholder="GitHub Token (삭제 기능용)"
      oninput="localStorage.setItem('githubToken',this.value)">
    <input type="text" id="adminRepo" placeholder="저장소 (max2guy/report-app)"
      oninput="localStorage.setItem('githubRepo',this.value)">
  </div>
  <div class="header-tabs">
    <button class="h-tab active" id="tab-youth" onclick="switchTab('youth')">중고등부</button>
    <button class="h-tab"        id="tab-young" onclick="switchTab('young')">청년부</button>
    <button class="h-tab"        id="tab-adult" onclick="switchTab('adult')">장년</button>
  </div>
</div>

<div class="content">
  <div id="panel-youth" class="tab-panel active"></div>
  <div id="panel-young" class="tab-panel"></div>
  <div id="panel-adult" class="tab-panel"></div>
  <div id="loadingSpinner"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<!-- INBOX MODAL -->
<div class="inbox-overlay" id="inboxOverlay" onclick="closeInbox(event)">
  <div class="inbox-sheet">
    <div class="inbox-handle"></div>
    <div class="inbox-title">💬 메시지함</div>

    <!-- 지시사항 작성 -->
    <div class="inbox-compose">
      <div class="inbox-section-title">📝 지시사항 작성 (부교역자에게 전달)</div>
      <textarea id="instrText" placeholder="지시사항을 입력하세요"></textarea>
      <button class="inbox-send-btn" onclick="sendInstruction()">전송</button>
    </div>

    <hr class="inbox-divider">

    <!-- 수신된 보고서 알림 -->
    <div class="inbox-section-title">📄 보고서 도착 알림</div>
    <div id="notifList"><div class="inbox-empty">없음</div></div>

    <hr class="inbox-divider">

    <!-- 발신 지시사항 목록 -->
    <div class="inbox-section-title">📋 발신 지시사항</div>
    <div id="instrList"><div class="inbox-empty">없음</div></div>
  </div>
</div>

<script>
const INSTR_URL  = './instructions.json';
const NOTIF_URL  = './notifications.json';
let viewerLastNotifId = localStorage.getItem('viewerLastNotifId') || '';
let viewerUnread = 0;

function openInbox() {
  document.getElementById('inboxOverlay').classList.add('open');
  // 뱃지 초기화
  viewerUnread = 0;
  const badge = document.getElementById('viewerInboxBadge');
  if (badge) badge.style.display = 'none';
  localStorage.setItem('viewerLastNotifId', viewerLastNotifId);
  loadInboxData();
}
function closeInbox(e) {
  if (e.target === e.currentTarget) document.getElementById('inboxOverlay').classList.remove('open');
}

async function loadInboxData() {
  // 보고서 알림 로드
  try {
    const res = await fetch(NOTIF_URL + '?t=' + Date.now());
    if (res.ok) {
      const list = await res.json();
      const el = document.getElementById('notifList');
      if (!list.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; }
      else {
        el.innerHTML = list.slice().reverse().map(n => `
          <div class="inbox-item ${n.id !== viewerLastNotifId && list.indexOf(n) >= list.findIndex(x => x.id === viewerLastNotifId) ? '' : ''}">
            <div class="inbox-item-meta"><span>${n.date}</span><span>${n.reporter || ''}</span></div>
            <div class="inbox-item-text">📄 ${n.title}</div>
          </div>`).join('');
      }
    }
  } catch(e) {}

  // 지시사항 목록 로드
  try {
    const res = await fetch(INSTR_URL + '?t=' + Date.now());
    if (res.ok) {
      const list = await res.json();
      const el = document.getElementById('instrList');
      if (!list.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; }
      else {
        el.innerHTML = list.slice().reverse().map(i => `
          <div class="inbox-item">
            <div class="inbox-item-meta">${i.date}</div>
            <div class="inbox-item-text">${i.text.replace(/\n/g,'<br>')}</div>
          </div>`).join('');
      }
    }
  } catch(e) {}
}

async function sendInstruction() {
  const text = document.getElementById('instrText').value.trim();
  if (!text) { toast('내용을 입력하세요'); return; }
  const token = (localStorage.getItem('githubToken') || '').trim();
  const repo  = (localStorage.getItem('githubRepo')  || 'max2guy/report-app').trim();
  if (!token) { toast('⚙️ GitHub Token을 설정에 입력하세요'); return; }

  const apiBase = `https://api.github.com/repos/${repo}/contents/instructions.json`;
  const authVal = token.startsWith('github_pat_') ? `Bearer ${token}` : `token ${token}`;
  const headers = { 'Authorization':authVal,'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28' };

  try {
    toast('⏳ 전송 중...');
    const infoRes = await fetch(apiBase, { headers });
    let sha = null; let list = [];
    if (infoRes.ok) {
      const info = await infoRes.json(); sha = info.sha;
      try { list = JSON.parse(atob(info.content.replace(/\n/g,''))); } catch(_) {}
    }
    const now = new Date();
    list.push({ id: now.toISOString(), date: now.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}), text });
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(list, null, 2))));
    const body = { message:`instruction: ${now.toISOString().slice(0,10)}`, content };
    if (sha) body.sha = sha;
    const putRes = await fetch(apiBase, { method:'PUT', headers, body:JSON.stringify(body) });
    if (!putRes.ok) { const err = await putRes.json(); throw new Error(err.message); }
    document.getElementById('instrText').value = '';
    toast('✅ 지시사항 전송 완료');
    loadInboxData();
  } catch(e) { toast('❌ 전송 실패: ' + e.message); }
}

// 보고서 알림 폴링
async function pollNotifications() {
  try {
    const res = await fetch(NOTIF_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const list = await res.json();
    if (!list.length) return;
    const latest = list[list.length - 1];
    if (latest.id !== viewerLastNotifId && viewerLastNotifId !== latest.id) {
      const savedId = localStorage.getItem('viewerLastNotifId') || '';
      if (latest.id !== savedId) {
        viewerUnread++;
        const badge = document.getElementById('viewerInboxBadge');
        if (badge) { badge.style.display='flex'; badge.textContent = viewerUnread; }
        toast('📄 새 보고서가 도착했습니다');
        if (Notification.permission === 'granted') {
          new Notification('📄 새 보고서 도착', { body: latest.title, icon:'./icon-192.png' });
        }
        viewerLastNotifId = latest.id;
        localStorage.setItem('viewerLastNotifId', latest.id);
      }
    }
  } catch(e) {}
}

// 알림 권한 + 폴링 시작
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
pollNotifications();
setInterval(pollNotifications, 3 * 60 * 1000); // 3분 주기
</script>

<script>
const DATA_URL = './history.json';
let allData = [];
let activeTab = 'youth';

/* ── TOAST ── */
function toast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ── ADMIN TOGGLE ── */
function toggleAdmin() {
  const p = document.getElementById('adminPanel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) {
    document.getElementById('adminToken').value = localStorage.getItem('githubToken') || '';
    document.getElementById('adminRepo').value  = localStorage.getItem('githubRepo')  || 'max2guy/report-app';
  }
}

/* ── HELPERS ── */
function rateClass(r) {
  return r >= 70 ? 'rate-good' : r >= 50 ? 'rate-mid' : 'rate-low';
}
function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
}
function fmtShort(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  return `${parseInt(m)}/${parseInt(day)}`;
}

/* ── 월별 집계 (주평균 출석률) ── */
function monthSummary(data, group) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    const g = row[group];
    if (!g || !g.total) return;
    if (!map[key]) map[key] = { rateSum: 0, weeks: 0, members: 0 };
    map[key].rateSum  += Math.round(g.present / g.total * 100);
    map[key].members   = Math.max(map[key].members, g.total);
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      rate:  Math.round(v.rateSum / v.weeks),   // 주평균 출석률
      weeks: v.weeks,
      members: v.members
    }));
}

function adultMonthSummary(data) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    if (!map[key]) map[key] = { absent: 0, weeks: 0 };
    map[key].absent += (row.adult || {}).absent || 0;
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      absent: v.absent,
      weeks:  v.weeks,
      avg:    v.weeks ? Math.round(v.absent / v.weeks * 10) / 10 : 0
    }));
}

/* ── 연속 결석 ── */
function calcConsecAbsent(data, group) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row[group] || {}).absentNames || []);
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function calcAdultConsec(data) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row.adult?.zones || []).flatMap(z => z.names));
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function renderConsecBlock(list) {
  if (!list.length) return `<div style="font-size:12px;color:var(--muted)">연속 결석자 없음</div>`;
  return `<div class="consec-list">${list.map(({name, weeks}) =>
    `<div class="consec-row"><span class="consec-name">${name}</span><span class="consec-badge">${weeks}주 연속</span></div>`
  ).join('')}</div>`;
}

/* ── 삭제 ── */
async function deleteRow(date) {
  if (!confirm(`${fmtDate(date)} 데이터를 삭제할까요?`)) return;
  allData = allData.filter(r => r.date !== date);
  render();
  // GitHub 동기화
  const token = (localStorage.getItem('githubToken') || '').trim();
  const repo  = (localStorage.getItem('githubRepo')  || 'max2guy/report-app').trim();
  if (!token) { toast('🗑️ 로컬 삭제 완료 (GitHub 미동기화)'); return; }
  try {
    const apiBase = `https://api.github.com/repos/${repo}/contents/history.json`;
    const authVal = token.startsWith('github_pat_') ? `Bearer ${token}` : `token ${token}`;
    const headers = { 'Authorization': authVal, 'Accept': 'application/vnd.github+json',
                      'Content-Type': 'application/json', 'X-GitHub-Api-Version': '2022-11-28' };
    const infoRes = await fetch(apiBase, { headers });
    if (!infoRes.ok) throw new Error(infoRes.status);
    const { sha } = await infoRes.json();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
    const putRes  = await fetch(apiBase, { method: 'PUT', headers,
      body: JSON.stringify({ message: `delete: remove ${date}`, content, sha }) });
    if (!putRes.ok) throw new Error(putRes.status);
    toast('✅ 삭제 및 GitHub 동기화 완료');
  } catch(e) {
    toast('⚠️ 로컬 삭제됨, GitHub 실패: ' + e.message);
  }
}

/* ── 월별 분석 렌더 ── */
function renderMonthBar(months, barClass, metaFn) {
  if (!months.length) return '<div style="font-size:12px;color:var(--muted)">데이터 없음</div>';
  return `<div class="monthly-analysis">${months.map(m => {
    const w = m.rate ?? Math.round(m.absent / Math.max(...months.map(x => x.absent), 1) * 100);
    return `<div class="ma-row">
      <div class="ma-label">${m.label}</div>
      <div class="ma-bar-bg">
        <div class="ma-bar ${barClass}" style="width:${Math.max(w, 10)}%">${m.rate !== undefined ? m.rate + '%' : m.absent + '명'}</div>
      </div>
      <div class="ma-meta">${metaFn(m)}</div>
    </div>`;
  }).join('')}</div>`;
}

/* ── 중고등부 / 청년부 패널 ── */
function renderGroupPanel(group) {
  const el     = document.getElementById(`panel-${group}`);
  if (!allData.length) { el.innerHTML = '<div class="empty">데이터가 없습니다</div>'; return; }
  const bar    = group === 'youth' ? 'bar-youth'       : 'bar-young';
  const maBar  = group === 'youth' ? 'ma-bar-youth'    : 'ma-bar-young';
  const latest = allData[allData.length - 1];
  const gData  = latest[group] || {};
  const rate   = gData.total ? Math.round(gData.present / gData.total * 100) : 0;
  const absent = gData.absentNames || [];
  const recent = allData.slice(-8);
  const months = monthSummary(allData, group);
  const consec = calcConsecAbsent(allData, group);
  const hasToken = !!localStorage.getItem('githubToken');

  el.innerHTML = `
    <div class="card">
      <div class="card-title"><span>📅 최근 주일</span></div>
      <div class="latest-date">${fmtDate(latest.date)}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-label">출석</div><div class="stat-val" style="color:#2c7be5">${gData.present ?? '-'}</div><div class="stat-sub">명</div></div>
        <div class="stat-box"><div class="stat-label">결석</div><div class="stat-val" style="color:#e53e3e">${gData.absent ?? '-'}</div><div class="stat-sub">명</div></div>
        <div class="stat-box"><div class="stat-label">전체</div><div class="stat-val">${gData.total ?? '-'}</div><div class="stat-sub">명</div></div>
      </div>
      <div style="text-align:center"><span class="badge-rate ${rateClass(rate)}">출석률 ${rate}%</span></div>
      <div class="absent-block">
        <div class="absent-block-title">결석자</div>
        <div class="name-chips">
          ${absent.length ? absent.map(n => `<span class="name-chip">${n}</span>`).join('') : '<span class="name-chip none">결석자 없음</span>'}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 최근 8주 추이</div>
      <div class="chart-wrap">${recent.map(row => {
        const g = row[group] || {};
        const w = g.total ? Math.round(g.present / g.total * 100) : 0;
        return `<div class="chart-row"><div class="chart-label">${fmtShort(row.date)}</div><div class="chart-bar-bg"><div class="chart-bar ${bar}" style="width:${w}%">${w}%</div></div></div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📅 월별 평균 출석률</div>
      ${renderMonthBar(months, maBar, m => `${m.weeks}주`)}
    </div>

    <div class="card">
      <div class="card-title">🔴 연속 결석</div>
      ${renderConsecBlock(consec)}
    </div>

    <div class="card">
      <div class="card-title">📋 전체 주일 기록</div>
      ${allData.slice().reverse().map(row => {
        const g = row[group] || {};
        const r = g.total ? Math.round(g.present / g.total * 100) : 0;
        return `<div class="history-row">
          <div class="history-date">${fmtDate(row.date)}</div>
          <div class="history-right">
            <span style="font-size:12px;color:var(--muted)">${g.present ?? '-'}/${g.total ?? '-'}명</span>
            <span class="badge-rate ${rateClass(r)}" style="font-size:10px">${r}%</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── 장년 패널 ── */
function renderAdultPanel() {
  const el = document.getElementById('panel-adult');
  if (!allData.length) { el.innerHTML = '<div class="empty">데이터가 없습니다</div>'; return; }

  const latest = allData[allData.length - 1];
  const adult  = latest.adult || {};
  const zones  = adult.zones || [];
  const d1 = zones.filter(z => parseInt(z.zone) <= 6);
  const d2 = zones.filter(z => parseInt(z.zone) >= 7);

  const buildZoneRows = list =>
    list.length
      ? list.map(z => `<div class="zone-row">
          <div class="zone-row-head"><span class="zone-name">${z.zone}</span><span class="zone-count">${z.names.length}명</span></div>
          <div class="name-chips">${z.names.map(n => `<span class="name-chip">${n}</span>`).join('')}</div>
        </div>`).join('')
      : '<div style="font-size:12px;color:var(--muted);padding:4px 0">결석자 없음</div>';

  const recent    = allData.slice(-8);
  const maxAbsent = Math.max(...recent.map(r => (r.adult || {}).absent || 0), 1);
  const months    = adultMonthSummary(allData);
  const maxMonthAbsent = Math.max(...months.map(m => m.absent), 1);

  el.innerHTML = `
    <div class="card">
      <div class="card-title"><span>📅 최근 주일 — ${fmtDate(latest.date)}</span></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:13px;color:var(--muted)">장년 결석</span>
        <span style="font-size:clamp(18px,5vw,22px);font-weight:700;color:#e53e3e">${adult.absent ?? '-'}명</span>
      </div>
      ${!d1.length && !d2.length ? '<div class="empty" style="padding:12px 0">결석자 없음</div>' : ''}
      ${d1.length ? `<div class="district-title">1교구 (1~6구역) · 교구장 이명숙</div><div class="zone-absent-list">${buildZoneRows(d1)}</div>` : ''}
      ${d2.length ? `<div class="district-title" style="margin-top:${d1.length?'12px':'0'}">2교구 (7~12구역) · 교구장 이정순</div><div class="zone-absent-list">${buildZoneRows(d2)}</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">📊 최근 8주 결석 추이</div>
      <div class="chart-wrap">${recent.map(row => {
        const a   = row.adult || {};
        const cnt = a.absent || 0;
        const w   = Math.round(cnt / maxAbsent * 100);
        return `<div class="chart-row"><div class="chart-label">${fmtShort(row.date)}</div><div class="chart-bar-bg"><div class="chart-bar bar-adult" style="width:${Math.max(w,8)}%">${cnt}명</div></div></div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📅 월별 결석 분석</div>
      <div class="monthly-analysis">${months.map(m => {
        const w = Math.round(m.absent / maxMonthAbsent * 100);
        return `<div class="ma-row">
          <div class="ma-label">${m.label}</div>
          <div class="ma-bar-bg"><div class="ma-bar ma-bar-adult" style="width:${Math.max(w,10)}%">${m.absent}명</div></div>
          <div class="ma-meta">주평균 ${m.avg}명</div>
        </div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">🔴 연속 결석</div>
      ${renderConsecBlock(calcAdultConsec(allData))}
    </div>

    <div class="card">
      <div class="card-title">📋 전체 주일 기록</div>
      ${allData.slice().reverse().map(row => {
        const a = row.adult || {};
        return `<div class="history-row">
          <div class="history-date">${fmtDate(row.date)}</div>
          <div class="history-right">
            <span style="font-size:13px;font-weight:600;color:#e53e3e">${a.absent ?? '-'}명 결석</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── SWITCH TAB ── */
function switchTab(tab) {
  activeTab = tab;
  ['youth','young','adult'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
}

/* ── RENDER ── */
function render() {
  renderGroupPanel('youth');
  renderGroupPanel('young');
  renderAdultPanel();
}

/* ── LOAD ── */
async function loadData(showMsg = false) {
  document.getElementById('loadingSpinner').style.display = 'block';
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    allData = await res.json();
    allData.sort((a, b) => a.date.localeCompare(b.date));
    render();
    if (showMsg) toast('✅ 최신 데이터로 업데이트');
  } catch(e) {
    ['youth','young','adult'].forEach(t => {
      document.getElementById(`panel-${t}`).innerHTML =
        `<div class="empty">데이터를 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    });
  } finally {
    document.getElementById('loadingSpinner').style.display = 'none';
  }
}

loadData();

/* ── SWIPE ── */
const TABS = ['youth','young','adult'];
let _tx = 0, _ty = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  const dy = e.changedTouches[0].clientY - _ty;
  if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
  const idx = TABS.indexOf(activeTab);
  if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
  if (dx > 0 && idx > 0)              switchTab(TABS[idx - 1]);
}, { passive: true });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw-viewer.js').catch(() => {});
</script>
