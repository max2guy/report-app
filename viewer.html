<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="사역현황">
<meta name="theme-color" content="#0f2044">
<link rel="manifest" href="./viewer-manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
<title>사역 현황 — 연천장로교회</title>
<style>
:root {
  --navy:#0f2044; --navy2:#1a3a7a; --blue:#2c5aa0;
  --gold:#c9a84c; --bg:#f0f4f8; --card:#fff;
  --text:#1a202c; --muted:#718096; --border:#e2e8f0;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  --sp:clamp(10px,3vw,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:clamp(13px,3.5vw,15px);line-height:1.5;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none}
*::-webkit-scrollbar{display:none}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:calc(10px + var(--safe-top)) var(--sp) 8px;
  color:#fff;position:sticky;top:0;z-index:50;
  transition:padding .25s;
}
.header.compact{padding-top:calc(6px + var(--safe-top));padding-bottom:6px}
/* 항상 보이는 바: 타이틀(or 부서명) + 액션 버튼 */
.header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.header-bar-title{font-size:clamp(14px,4vw,17px);font-weight:700;transition:font-size .2s}
/* 부제목: 컴팩트 시 접힘 */
.header-sub{
  font-size:11px;opacity:.7;
  overflow:hidden;max-height:20px;margin-bottom:8px;
  transition:max-height .25s ease,opacity .2s ease,margin .25s ease;
}
.header.compact .header-sub{max-height:0;opacity:0;margin-bottom:0}
.header-actions{display:flex;gap:6px}
.hdr-btn{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:6px 10px;font-size:12px;
  cursor:pointer;font-family:inherit;font-weight:500;
}
.header-tabs{display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:10px;padding:3px}
.h-tab{
  flex:1;padding:6px 4px;border:none;border-radius:8px;
  font-size:clamp(11px,3vw,13px);font-weight:600;font-family:inherit;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.6);transition:all .2s;
}
.h-tab.active{background:#fff;color:var(--navy)}

/* CONTENT */
.content{
  padding:var(--sp) var(--sp) calc(16px + var(--safe-bottom));
  max-width:520px;margin:0 auto;
}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CARD */
.card{
  background:var(--card);border-radius:12px;
  padding:clamp(8px,2.5vw,12px);margin-bottom:8px;
  box-shadow:0 2px 8px rgba(15,32,68,.07);
}
.card-title{
  font-size:11px;font-weight:600;color:var(--muted);
  letter-spacing:.3px;margin-bottom:7px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}

/* STAT ROW */
.stat-row{display:flex;gap:5px}
.stat-box{
  flex:1;text-align:center;background:#f7f9fc;
  border-radius:7px;padding:5px 3px;
}
.stat-label{font-size:clamp(9px,2.5vw,10px);color:var(--muted);margin-bottom:1px}
.stat-valrow{display:flex;align-items:baseline;justify-content:center;gap:2px}
.stat-val{font-size:clamp(14px,3.8vw,17px);font-weight:700;color:var(--navy)}
.stat-sub{font-size:clamp(9px,2.5vw,11px);color:var(--muted)}
.badge-rate{
  display:inline-block;padding:2px 7px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.rate-good{background:#f0fff4;color:#276749}
.rate-mid{background:#fffbeb;color:#975a16}
.rate-low{background:#fff5f5;color:#c53030}

/* ABSENT NAMES */
.absent-block{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.absent-block-title{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:500}
.name-chips{display:flex;flex-wrap:wrap;gap:5px}
.name-chip{
  background:#fff5f5;color:#c53030;border:1px solid #fecaca;
  border-radius:20px;padding:2px 9px;font-size:12px;font-weight:500;
}
.name-chip.none{background:#f0fff4;color:#276749;border-color:#9ae6b4}

/* ZONE ABSENT */
.zone-absent-list{display:flex;flex-direction:column;gap:8px}
.zone-row{background:#f7f9fc;border-radius:10px;padding:10px 12px}
.zone-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.zone-name{font-size:13px;font-weight:600;color:var(--navy)}
.zone-count{font-size:11px;color:#c53030;font-weight:600;background:#fff5f5;padding:2px 7px;border-radius:10px}
.district-title{
  font-size:12px;font-weight:700;color:var(--blue);
  margin:12px 0 7px;padding-left:8px;
  border-left:3px solid var(--blue);
}

/* CHART */
.chart-wrap{margin-top:2px}
.chart-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-label{font-size:11px;color:var(--muted);width:40px;flex-shrink:0;text-align:right}
.chart-bar-bg{flex:1;height:20px;background:#eef2f8;border-radius:6px;overflow:hidden}
.chart-bar{
  height:100%;border-radius:6px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:6px;font-size:10px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:24px;
}
.bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.bar-adult{background:linear-gradient(90deg,#276749,#38a169)}

/* MONTHLY ANALYSIS */
.monthly-analysis{display:flex;flex-direction:column;gap:8px}
.ma-row{display:flex;align-items:center;gap:8px}
.ma-label{font-size:12px;font-weight:600;color:var(--navy);width:32px;flex-shrink:0}
.ma-bar-bg{flex:1;height:24px;background:#eef2f8;border-radius:6px;overflow:hidden}
.ma-bar{
  height:100%;border-radius:6px;
  display:flex;align-items:center;padding:0 8px;
  font-size:11px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:36px;white-space:nowrap;
}
.ma-bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.ma-bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.ma-bar-adult{background:linear-gradient(90deg,#276749,#38a169)}
.ma-meta{font-size:10px;color:var(--muted);width:44px;text-align:right;flex-shrink:0}

/* CONSECUTIVE ABSENT */
.consec-list{display:flex;flex-direction:column;gap:6px}
.consec-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff8f8;border:1px solid #fecaca;border-radius:8px;padding:7px 12px;
}
.consec-name{font-size:13px;font-weight:600}
.consec-badge{background:#e53e3e;color:#fff;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700}

/* HISTORY LIST */
.history-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);gap:8px;
}
.history-row:last-child{border-bottom:none}
.history-date{font-size:13px;color:var(--text);flex-shrink:0}
.history-right{display:flex;align-items:center;gap:8px}


/* EMPTY / SPINNER */
.empty{text-align:center;color:var(--muted);padding:32px 0;font-size:13px}
.spinner{display:flex;justify-content:center;align-items:center;height:100px}
.spinner::after{
  content:'';width:28px;height:28px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--blue);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MESSAGE INBOX */
.inbox-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease;
  -webkit-backdrop-filter:blur(0);
}
.inbox-overlay.open{opacity:1;pointer-events:all}
.inbox-sheet{
  background:#fff;border-radius:20px 20px 0 0;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  width:100%;max-width:520px;max-height:80vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.32,.72,0,1);
  will-change:transform;
  -webkit-overflow-scrolling:touch;
}
.inbox-overlay.open .inbox-sheet{transform:translateY(0)}
.inbox-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 14px}
.inbox-title{font-size:15px;font-weight:700;color:#0f2044;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.inbox-compose textarea{
  width:100%;min-height:80px;padding:10px 12px;
  border:1px solid #e2e8f0;border-radius:10px;
  font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;margin-bottom:8px;
}
.inbox-send-btn{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#0f2044,#1a3a7a);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
}
.inbox-divider{border:none;border-top:1px solid #e2e8f0;margin:12px 0}
.inbox-section-title{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.inbox-item{
  background:#f7f9fc;border-radius:10px;padding:10px 12px;margin-bottom:7px;
}
.inbox-item.unread{background:#fffbeb;border-left:3px solid #c9a84c}
.inbox-item-meta{font-size:11px;color:#718096;margin-bottom:3px;display:flex;justify-content:space-between}
.inbox-item-text{font-size:13px;color:#1a202c;line-height:1.5}
.inbox-empty{font-size:12px;color:#718096;text-align:center;padding:20px 0}
/* HEADER BADGE */
.hdr-btn-wrap{position:relative;display:inline-flex}
.hdr-badge{
  position:absolute;top:-4px;right:-4px;
  background:#e53e3e;color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}

/* TOAST */
.toast{
  position:fixed;top:calc(16px + env(safe-area-inset-top, 0px));left:50%;transform:translateX(-50%);
  background:#1a202c;color:#fff;padding:9px 18px;border-radius:22px;
  font-size:13px;font-weight:500;z-index:9999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
  <!-- 항상 표시: 타이틀(컴팩트 시 부서명) + 버튼 -->
  <div class="header-bar">
    <span class="header-bar-title" id="headerBarTitle">⛪ 사역 현황</span>
    <div class="header-actions">
      <button class="hdr-btn" id="btnInstall" onclick="installPWA()" style="display:none">📲</button>
      <button class="hdr-btn" id="btnFCMRegister" onclick="initFCM(true)" title="알림 등록" style="opacity:0.5">🔔</button>
      <div class="hdr-btn-wrap">
        <button class="hdr-btn" onclick="openInbox()">💬</button>
        <span class="hdr-badge" id="viewerInboxBadge" style="display:none">0</span>
      </div>
      <button class="hdr-btn" onclick="loadData(true)">🔄</button>
    </div>
  </div>
  <!-- 컴팩트 시 숨겨지는 부제목 -->
  <div class="header-sub">연천장로교회 교역자 주일 보고 <span id="viewerVerLabel" style="font-size:10px;opacity:0.5"></span></div>
  <!-- 탭: 항상 표시 -->
  <div class="header-tabs">
    <button class="h-tab active" id="tab-youth" onclick="switchTab('youth')">중고등부</button>
    <button class="h-tab"        id="tab-young" onclick="switchTab('young')">청년부</button>
    <button class="h-tab"        id="tab-adult" onclick="switchTab('adult')">장년</button>
  </div>
</div>

<div class="content">
  <div id="panel-youth" class="tab-panel active"></div>
  <div id="panel-young" class="tab-panel"></div>
  <div id="panel-adult" class="tab-panel"></div>
  <div id="loadingSpinner"><div class="spinner"></div></div>
</div>

<div class="toast" id="toast"></div>

<!-- INBOX MODAL -->
<div class="inbox-overlay" id="inboxOverlay" onclick="closeInbox(event)">
  <div class="inbox-sheet">
    <div class="inbox-handle"></div>
    <!-- 타이틀 + 닫기 버튼 -->
    <div class="inbox-title">
      💬 메시지함
      <button onclick="document.getElementById('inboxOverlay').classList.remove('open')"
        style="margin-left:auto;background:none;border:none;font-size:18px;color:#a0aec0;cursor:pointer;line-height:1;padding:0 2px">✕</button>
    </div>

    <!-- 지시사항 작성 -->
    <div class="inbox-compose">
      <div class="inbox-section-title">📝 지시사항 작성 (부교역자에게 전달)</div>
      <textarea id="instrText" placeholder="지시사항을 입력하세요"></textarea>
      <button class="inbox-send-btn" onclick="sendInstruction()">전송</button>
    </div>

    <hr class="inbox-divider">

    <!-- 수신된 보고서 알림 -->
    <div class="inbox-section-title">📄 보고서 도착 알림</div>
    <div id="notifList"><div class="inbox-empty">없음</div></div>

    <hr class="inbox-divider">

    <!-- 발신 지시사항 목록 -->
    <div class="inbox-section-title">📋 발신 지시사항</div>
    <div id="instrList"><div class="inbox-empty">없음</div></div>

  </div>
</div>

<script>
const RAW_BASE   = 'https://raw.githubusercontent.com/max2guy/report-app/main';
const INSTR_URL  = RAW_BASE + '/instructions.json';
const NOTIF_URL  = RAW_BASE + '/notifications.json';
let viewerLastNotifId = localStorage.getItem('viewerLastNotifId') || '';
let viewerUnread = 0;
// 지시사항 인메모리 캐시 — raw URL CDN 캐시(~5분) 때문에 삭제/추가 즉시 UI에 반영하기 위해 사용
let _instrList = JSON.parse(localStorage.getItem('viewerInstrCache') || '[]');

function openInbox() {
  document.getElementById('inboxOverlay').classList.add('open');
  // 뱃지 초기화
  viewerUnread = 0;
  const badge = document.getElementById('viewerInboxBadge');
  if (badge) badge.style.display = 'none';
  localStorage.setItem('viewerLastNotifId', viewerLastNotifId);
  loadInboxData();
}
function closeInbox(e) {
  if (e.target === e.currentTarget) {
    document.getElementById('inboxOverlay').classList.remove('open');
  }
}

async function loadInboxData() {
  // 보고서 알림 로드
  try {
    const res = await fetch(NOTIF_URL + '?t=' + Date.now());
    if (res.ok) {
      const list = await res.json();
      const el = document.getElementById('notifList');
      if (!list.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; }
      else {
        const lastSeenIdx = list.findIndex(x => x.id === viewerLastNotifId);
        el.innerHTML = list.slice().reverse().map(n => {
          const idx = list.indexOf(n);
          // lastSeenIdx가 -1이면 한 번도 안 본 것 → 전체 unread
          // 그 외엔 lastSeenIdx보다 뒤(최신)에 있는 항목만 unread
          const isUnread = lastSeenIdx === -1 || idx > lastSeenIdx;
          return `
          <div class="inbox-item ${isUnread ? 'unread' : ''}">
            <div class="inbox-item-meta"><span>${n.date}</span><span>${n.reporter || ''}</span></div>
            <div class="inbox-item-text">📄 ${n.title}</div>
          </div>`;
        }).join('');
      }
    }
  } catch(e) {}

  // 지시사항: 캐시를 즉시 표시 후 백그라운드에서 네트워크 갱신
  renderInstrList(); // 캐시 즉시 표시
  fetch(INSTR_URL + '?t=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (Array.isArray(data)) renderInstrList(data); })
    .catch(() => {});
}

function renderInstrList(list) {
  // list가 주어지면 캐시 갱신, 아니면 캐시에서 읽기
  if (list !== undefined) {
    _instrList = list;
    localStorage.setItem('viewerInstrCache', JSON.stringify(_instrList));
  }
  const el = document.getElementById('instrList');
  if (!el) return;
  if (!_instrList.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; return; }
  el.innerHTML = _instrList.slice().reverse().map(i => `
    <div class="inbox-item">
      <div class="inbox-item-meta">
        <span>${i.date}</span>
        <button onclick="deleteInstruction('${i.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#e53e3e;padding:0">🗑️</button>
      </div>
      <div class="inbox-item-text">${i.text.replace(/\n/g,'<br>')}</div>
    </div>`).join('');
}

const WORKER_URL = 'https://nas-proxy.max2guy.workers.dev';

async function deleteInstruction(id) {
  // 1. 캐시에서 즉시 제거 → UI 즉시 반영 (raw URL CDN 캐시 관계없이)
  const before = _instrList.slice();
  const filtered = _instrList.filter(i => i.id !== id);
  renderInstrList(filtered);
  try {
    // 2. GitHub에 삭제된 목록 저장 (sha는 Worker 자동 처리)
    const content = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(filtered, null, 2))));
    const putRes = await fetch(`${WORKER_URL}/github-write`, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ file:'instructions.json', message:'delete instruction', content }) });
    if (!putRes.ok) throw new Error('삭제 실패 ' + putRes.status);
    toast('🗑️ 삭제 완료');
  } catch(e) {
    // 실패 시 롤백
    renderInstrList(before);
    toast('❌ ' + e.message);
  }
}

async function sendInstruction() {
  const text = document.getElementById('instrText').value.trim();
  if (!text) { toast('내용을 입력하세요'); return; }
  try {
    toast('⏳ 전송 중...');
    // GET: raw URL (인증 불필요)
    let list = [];
    try { const r = await fetch(INSTR_URL + '?t=' + Date.now()); if (r.ok) list = await r.json(); } catch(_) {}
    const now = new Date();
    list.push({ id: now.toISOString(), date: now.toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}), text });
    const content = btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(list, null, 2))));
    // PUT: Worker 프록시 (sha는 Worker가 자동 처리)
    const putRes = await fetch(`${WORKER_URL}/github-write`, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ file:'instructions.json', message:`instruction: ${now.toISOString().slice(0,10)}`, content }) });
    if (!putRes.ok) { const err = await putRes.json().catch(()=>({message:'전송 실패'})); throw new Error(err.message); }
    document.getElementById('instrText').value = '';
    toast('✅ 지시사항 전송 완료');
    renderInstrList(list); // 캐시 갱신 + UI 반영
    getTargetFCMToken('reportApp').then(tok => {
      if(tok) sendFCMPush(tok, '📋 새 지시사항', text.substring(0,60));
    });
  } catch(e) { toast('❌ 전송 실패: ' + e.message); }
}

// 보고서 알림 폴링
async function pollNotifications() {
  try {
    const res = await fetch(NOTIF_URL + '?t=' + Date.now());
    if (!res.ok) return;
    const list = await res.json();
    if (!list.length) return;
    const latest = list[list.length - 1];
    const savedId = localStorage.getItem('viewerLastNotifId') || '';
    if (latest.id !== savedId) {
      viewerUnread++;
      const badge = document.getElementById('viewerInboxBadge');
      if (badge) { badge.style.display='flex'; badge.textContent = viewerUnread; }
      toast('📄 새 보고서가 도착했습니다');

/* ── FCM: PEM → ArrayBuffer ── */
function pemToArrayBuffer(pem) {
  const b64 = pem.replace(/-----[A-Z ]+-----/g,'').replace(/\s/g,'');
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}

/* ── FCM: 서비스 계정 JWT → OAuth2 액세스 토큰 ── */
let _fcmAccessToken = null, _fcmTokenExpiry = 0;
async function getFCMAccessToken() {
  if(_fcmAccessToken && Date.now() < _fcmTokenExpiry) return _fcmAccessToken;
  const now = Math.floor(Date.now()/1000);
  function b64u(str){ return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
  const hdr = b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const pld = b64u(JSON.stringify({
    iss:FCM_SA_EMAIL,
    scope:'https://www.googleapis.com/auth/firebase.messaging',
    aud:'https://oauth2.googleapis.com/token',
    exp:now+3600, iat:now
  }));
  const signing = `${hdr}.${pld}`;
  const key = await crypto.subtle.importKey(
    'pkcs8', pemToArrayBuffer(FCM_SA_KEY),
    {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'}, false, ['sign']
  );
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(signing));
  const sigB64u = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const jwt = `${signing}.${sigB64u}`;
  const res = await fetch('https://oauth2.googleapis.com/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  _fcmAccessToken = data.access_token;
  _fcmTokenExpiry = Date.now() + 55 * 60 * 1000;
  return _fcmAccessToken;
}

/* ── FCM: 알림 발송 ── */
async function sendFCMPush(targetToken, title, body) {
  if(!targetToken) return;
  try {
    const at = await getFCMAccessToken();
    const res = await fetch('https://fcm.googleapis.com/v1/projects/yeoncheon-church/messages:send',{
      method:'POST',
      headers:{'Authorization':`Bearer ${at}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:{
        token:targetToken,
        data:{title,body},
        webpush:{headers:{TTL:'86400'}}
      }})
    });
    if(!res.ok) console.warn('FCM send error', await res.json());
  } catch(e){ console.warn('FCM push failed',e); }
}

/* ── FCM: 토큰 GitHub 저장 ── */
async function saveFCMTokenToGitHub(role, fcmToken) {
  if(!fcmToken) return false;
  const rawUrl = RAW_BASE + '/fcm-tokens.json';
  try {
    // GET: raw URL (인증 불필요)
    let tokens = {};
    try { const r = await fetch(rawUrl + '?t=' + Date.now()); if(r.ok) tokens = await r.json(); } catch(_){}
    if(tokens[role]===fcmToken) return true; // 이미 최신 — 저장 불필요
    tokens[role]=fcmToken;
    const bytes = new TextEncoder().encode(JSON.stringify(tokens,null,2));
    let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
    const content = btoa(bin);
    // PUT: Worker 프록시 (sha는 Worker가 자동 처리)
    const res = await fetch(`${WORKER_URL}/github-write`, {method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({file:'fcm-tokens.json', message:`fcm: update ${role} token`, content})});
    if(!res.ok) { console.warn('FCM token save HTTP error', res.status); return false; }
    return true;
  } catch(e){ console.warn('FCM token save failed', e); return false; }
}

/* ── FCM: 상대방 토큰 조회 ── */
async function getTargetFCMToken(role) {

    if(!res.ok) return null;
    const tokens = await res.json();
    return tokens[role] || null;
  } catch(e){ return null; }
}

/* ── FCM: 초기화 (뷰어 앱용) ── */
async function initFCM(manual = false) {
  if(!('Notification' in window)) {
    if(manual) toast('❌ 이 브라우저는 알림을 지원하지 않습니다');
    return;
  }
  // 권한 요청
  let perm = Notification.permission;
  if(perm === 'default') perm = await Notification.requestPermission();
  if(perm !== 'granted') {
    if(manual) toast('❌ 알림 권한이 거부됐습니다. 브라우저 설정에서 허용해 주세요.');
    updateFCMStatusUI();
    return;
  }
  if(manual) toast('🔔 알림 등록 중...');
  try {
    if(!firebase.apps.length) firebase.initializeApp(FCM_FB_CONFIG);
    const messaging = firebase.messaging();
    const reg = await navigator.serviceWorker.ready;
    const token = await messaging.getToken({vapidKey:FCM_VAPID, serviceWorkerRegistration:reg});
    if(!token) throw new Error('토큰 발급 실패');

    localStorage.setItem('fcmToken_viewerApp', token);
    const saveOk = await saveFCMTokenToGitHub('viewerApp', token);
    if(saveOk) {
      if(manual) toast('✅ 알림 등록 완료');
    } else {
      if(manual) toast('⚠️ 토큰 저장 실패 — 잠시 후 다시 시도하세요');
    }
    updateFCMStatusUI();

    // 포그라운드 메시지 수신
    if(!window._fcmOnMessageSet) {
      window._fcmOnMessageSet = true;
      messaging.onMessage(payload => {
        const t = payload.data?.title || payload.notification?.title || '알림';
        const b = payload.data?.body  || payload.notification?.body  || '';
        toast(`🔔 ${t}: ${b}`, 4000);
      });
    }
  } catch(e) {
    console.warn('FCM init failed', e);
    if(manual) toast('❌ 알림 등록 실패: ' + e.message);
    updateFCMStatusUI();
  }
}

function updateFCMStatusUI() {
  const btn = document.getElementById('btnFCMRegister');
  if(!btn) return;
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
  const hasToken = !!localStorage.getItem('fcmToken_viewerApp');
  if(perm === 'granted' && hasToken) {
    btn.textContent = '🔔'; btn.title = '알림 등록됨';
    btn.style.opacity = '1';
  } else if(perm === 'denied') {
    btn.textContent = '🔕'; btn.title = '알림 권한 거부됨';
    btn.style.opacity = '0.6';
  } else {
    btn.textContent = '🔔'; btn.title = '알림 미등록 — 탭해서 등록';
    btn.style.opacity = '0.5';
  }
}

<script>
const DATA_URL = RAW_BASE + '/history.json';
const VIEWER_VERSION = '0.5.0';

/* ── TOAST ── */
function toast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}


/* ── HELPERS ── */
function rateClass(r) {
  return r >= 70 ? 'rate-good' : r >= 50 ? 'rate-mid' : 'rate-low';
}
function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
}
function fmtShort(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  return `${parseInt(m)}/${parseInt(day)}`;
}

/* ── 월별 집계 (주평균 출석률) ── */
function monthSummary(data, group) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    const g = row[group];
    if (!g || !g.total) return;
    if (!map[key]) map[key] = { rateSum: 0, weeks: 0, members: 0 };
    map[key].rateSum  += Math.round(g.present / g.total * 100);
    map[key].members   = Math.max(map[key].members, g.total);
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      rate:  Math.round(v.rateSum / v.weeks),   // 주평균 출석률
      weeks: v.weeks,
      members: v.members
    }));
}

function adultMonthSummary(data) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    if (!map[key]) map[key] = { absent: 0, weeks: 0 };
    map[key].absent += (row.adult || {}).absent || 0;
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      absent: v.absent,
      weeks:  v.weeks,
      avg:    v.weeks ? Math.round(v.absent / v.weeks * 10) / 10 : 0
    }));
}

/* ── 연속 결석 ── */
function calcConsecAbsent(data, group) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row[group] || {}).absentNames || []);
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function calcAdultConsec(data) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row.adult?.zones || []).flatMap(z => z.names));
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function renderConsecBlock(list) {
  if (!list.length) return `<div style="font-size:12px;color:var(--muted)">연속 결석자 없음</div>`;

  ).join('')}</div>`;
}

      ${!d1.length && !d2.length ? '<div class="empty" style="padding:12px 0">결석자 없음</div>' : ''}
      ${d1.length ? `<div class="district-title">1교구 (1~6구역) · 교구장 이명숙</div><div class="zone-absent-list">${buildZoneRows(d1)}</div>` : ''}
      ${d2.length ? `<div class="district-title" style="margin-top:${d1.length?'12px':'0'}">2교구 (7~12구역) · 교구장 이정순</div><div class="zone-absent-list">${buildZoneRows(d2)}</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">🔴 연속 결석</div>
      ${renderConsecBlock(calcAdultConsec(allData))}
    </div>

    <div class="card">
      <div class="card-title">📊 최근 8주 결석 추이</div>
      <div class="chart-wrap">${recent.map(row => {
        const a   = row.adult || {};
        const cnt = a.absent || 0;
        const w   = Math.round(cnt / maxAbsent * 100);
        return `<div class="chart-row"><div class="chart-label">${fmtShort(row.date)}</div><div class="chart-bar-bg"><div class="chart-bar bar-adult" style="width:${Math.max(w,8)}%">${cnt}명</div></div></div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📅 월별 결석 분석</div>
      <div class="monthly-analysis">${months.map(m => {
        const w = Math.round(m.absent / maxMonthAbsent * 100);
        return `<div class="ma-row">
          <div class="ma-label">${m.label}</div>
          <div class="ma-bar-bg"><div class="ma-bar ma-bar-adult" style="width:${Math.max(w,10)}%">${m.absent}명</div></div>
          <div class="ma-meta">주평균 ${m.avg}명</div>
        </div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📋 전체 주일 기록</div>
      ${allData.slice().reverse().map(row => {
        const a = row.adult || {};
        return `<div class="history-row">
          <div class="history-date">${fmtDate(row.date)}</div>
          <div class="history-right">
            <span style="font-size:13px;font-weight:600;color:#e53e3e">${a.absent ?? '-'}명 결석</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── TAB NAMES ── */
const TAB_NAMES = { youth: '중고등부', young: '청년부', adult: '장년' };

/* ── SWITCH TAB ── */
function switchTab(tab) {
  activeTab = tab;
  ['youth','young','adult'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
  // 컴팩트 상태면 타이틀도 교체
  const hdr = document.querySelector('.header');
  const title = document.getElementById('headerBarTitle');
  if (hdr.classList.contains('compact')) title.textContent = TAB_NAMES[tab];
}

/* ── RENDER ── */
function render() {
  renderGroupPanel('youth');
  renderGroupPanel('young');
  renderAdultPanel();
}

/* ── LOAD ── */
async function loadData(showMsg = false) {
  document.getElementById('loadingSpinner').style.display = 'block';
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    allData = await res.json();
    allData.sort((a, b) => a.date.localeCompare(b.date));
    render();
    if (showMsg) toast('✅ 최신 데이터로 업데이트');
  } catch(e) {
    ['youth','young','adult'].forEach(t => {
      document.getElementById(`panel-${t}`).innerHTML =
        `<div class="empty">데이터를 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    });
  } finally {
    document.getElementById('loadingSpinner').style.display = 'none';
  }
}

loadData();

// 버전 표시
const vEl = document.getElementById('viewerVerLabel');
if (vEl) vEl.textContent = `v${VIEWER_VERSION}`;

/* ── SWIPE ── */
const TABS = ['youth','young','adult'];
let _tx = 0, _ty = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  const dy = e.changedTouches[0].clientY - _ty;
  if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
  const idx = TABS.indexOf(activeTab);
  if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
  if (dx > 0 && idx > 0)              switchTab(TABS[idx - 1]);
}, { passive: true });

/* ── PWA 설치 프롬프트 ── */
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'block';
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'none';
});
function installPWA() {
  if (!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  _deferredInstallPrompt.userChoice.then(() => { _deferredInstallPrompt = null; });
}

/* ── SW 자동 업데이트 감지 ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw-viewer.js', { updateViaCache: 'none' }).then(reg => {
    reg.update(); // 앱 시작 시 항상 최신 SW 체크
    // 새 SW 설치 감지
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          // 새 버전 대기 중 → skipWaiting 요청
          newSW.postMessage('SKIP_WAITING');
        }
      });
    });
  }).catch(() => {});

  // SW 교체 완료 → 자동 리로드
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    toast('🆕 새 버전으로 업데이트 중...', 1500);
    setTimeout(() => location.reload(), 1500);
  });
}

/* ── HEADER COMPACT ON SCROLL ── */
(function(){
  const hdr   = document.querySelector('.header');
  const title = document.getElementById('headerBarTitle');
  let last = 0;
  window.addEventListener('scroll', () => {
    const cur = window.scrollY;
    if (cur > 50 && cur > last) {
      hdr.classList.add('compact');
      title.textContent = TAB_NAMES[activeTab]; // 부서 이름 표시
    } else if (cur < last - 5 || cur < 20) {
      hdr.classList.remove('compact');
      title.textContent = '⛪ 사역 현황';       // 원래 타이틀 복귀
    }
    last = cur;
  }, { passive: true });
})();
</script>
</body>
</html>
