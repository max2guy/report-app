<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="사역현황">
<meta name="theme-color" content="#0f2044">
<link rel="manifest" href="./viewer-manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<title>사역 현황 — 연천장로교회</title>
<style>
:root {
  --navy:#0f2044; --navy2:#1a3a7a; --blue:#2c5aa0;
  --gold:#c9a84c; --bg:#f0f4f8; --card:#fff;
  --text:#1a202c; --muted:#718096; --border:#e2e8f0;
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  --sp:clamp(10px,3vw,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  font-size:clamp(13px,3.5vw,15px);line-height:1.5;
  scrollbar-width:none;
}
body::-webkit-scrollbar{display:none}
*::-webkit-scrollbar{display:none}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:calc(10px + var(--safe-top)) var(--sp) 8px;
  color:#fff;position:sticky;top:0;z-index:50;
  transition:padding .25s;
}
.header.compact{padding-top:calc(6px + var(--safe-top));padding-bottom:6px}
/* 항상 보이는 바: 타이틀(or 부서명) + 액션 버튼 */
.header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.header-bar-title{font-size:clamp(14px,4vw,17px);font-weight:700;transition:font-size .2s}
/* 부제목: 컴팩트 시 접힘 */
.header-sub{
  font-size:11px;opacity:.7;
  overflow:hidden;max-height:20px;margin-bottom:8px;
  transition:max-height .25s ease,opacity .2s ease,margin .25s ease;
}
.header.compact .header-sub{max-height:0;opacity:0;margin-bottom:0}
.header-actions{display:flex;gap:6px}
.hdr-btn{
  background:rgba(255,255,255,.15);border:none;color:#fff;
  border-radius:8px;padding:7px 10px;font-size:12px;
  cursor:pointer;font-family:inherit;font-weight:500;
  display:inline-flex;align-items:center;justify-content:center;
}
.hdr-btn svg{width:18px;height:18px;stroke-width:2;display:block}
.header-tabs{display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:10px;padding:3px}
.h-tab{
  flex:1;padding:6px 4px;border:none;border-radius:8px;
  font-size:clamp(11px,3vw,13px);font-weight:600;font-family:inherit;cursor:pointer;
  background:transparent;color:rgba(255,255,255,.6);transition:all .2s;
}
.h-tab.active{background:#fff;color:var(--navy)}

/* CONTENT */
.content{
  padding:var(--sp) var(--sp) calc(16px + var(--safe-bottom));
  max-width:520px;margin:0 auto;
}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CARD */
.card{
  background:var(--card);border-radius:10px;
  padding:10px 12px;margin-bottom:7px;
  box-shadow:0 2px 8px rgba(15,32,68,.07);
}
.card-title{
  font-size:11px;font-weight:600;color:var(--muted);
  letter-spacing:.3px;margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}

/* STAT ROW */
.stat-row{display:flex;gap:5px}
.stat-box{
  flex:1;text-align:center;background:#f7f9fc;
  border-radius:7px;padding:4px 3px;
}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:1px}
.stat-valrow{display:flex;align-items:baseline;justify-content:center;gap:2px}
.stat-val{font-size:16px;font-weight:700;color:var(--navy)}
.stat-sub{font-size:10px;color:var(--muted)}
.badge-rate{
  display:inline-block;padding:2px 7px;border-radius:20px;
  font-size:11px;font-weight:600;
}
.rate-good{background:#f0fff4;color:#276749}
.rate-mid{background:#fffbeb;color:#975a16}
.rate-low{background:#fff5f5;color:#c53030}

/* ABSENT NAMES */
.absent-block{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.absent-block-title{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:500}
/* flex-wrap: 칩이 자연 너비로 배치되고 공간 부족 시 자동 줄바꿈 */
.name-chips{display:flex;flex-wrap:wrap;gap:5px}
.name-chip{
  background:#fff5f5;color:#c53030;border:1px solid #fecaca;
  border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500;
  white-space:nowrap;
}
.name-chip.none{background:#f0fff4;color:#276749;border-color:#9ae6b4}

/* ZONE ABSENT */
.zone-absent-list{display:flex;flex-direction:column;gap:0}
.zone-row{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.zone-row:last-child{border-bottom:none}
.zone-row-head{display:none}
.zone-name{display:flex;flex-direction:column;align-items:flex-start;width:42px;flex-shrink:0;gap:1px}
.zone-num{font-size:11px;font-weight:700;color:var(--navy)}
.zone-leader-name{font-size:10px;color:var(--muted);white-space:nowrap}
.zone-names-wrap{flex:1;display:flex;flex-wrap:wrap;gap:4px;align-self:center}
.zone-count{font-size:10px;color:#c53030;font-weight:700;flex-shrink:0;align-self:center;white-space:nowrap}
.district-title{
  font-size:11px;font-weight:700;color:var(--blue);
  margin:8px 0 4px;padding-left:6px;
  border-left:2px solid var(--blue);
}

/* CHART */
.chart-wrap{margin-top:2px}
.chart-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.chart-label{font-size:10px;color:var(--muted);width:36px;flex-shrink:0;text-align:right}
.chart-bar-bg{flex:1;height:17px;background:#eef2f8;border-radius:5px;overflow:hidden}
.chart-bar{
  height:100%;border-radius:5px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:5px;font-size:9px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:24px;
}
.bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.bar-adult{background:linear-gradient(90deg,#276749,#38a169)}

/* MONTHLY ANALYSIS */
.monthly-analysis{display:flex;flex-direction:column;gap:6px}
.ma-row{display:flex;align-items:center;gap:6px}
.ma-label{font-size:11px;font-weight:600;color:var(--navy);width:28px;flex-shrink:0}
.ma-bar-bg{flex:1;height:20px;background:#eef2f8;border-radius:5px;overflow:hidden}
.ma-bar{
  height:100%;border-radius:5px;
  display:flex;align-items:center;padding:0 7px;
  font-size:10px;font-weight:600;color:#fff;
  transition:width .5s ease;min-width:36px;white-space:nowrap;
}
.ma-bar-youth{background:linear-gradient(90deg,#2c5aa0,#4a7fd4)}
.ma-bar-young{background:linear-gradient(90deg,#b8922a,#c9a84c)}
.ma-bar-adult{background:linear-gradient(90deg,#276749,#38a169)}
.ma-meta{font-size:10px;color:var(--muted);width:44px;text-align:right;flex-shrink:0}

/* CONSECUTIVE ABSENT */
/* auto-fill: 셀 최소 88px 보장 → 좁은 폰에서 자동 줄바꿈, 태블릿에서 상위 미디어쿼리가 열 수 override */
.consec-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:5px}
.consec-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff8f8;border:1px solid #fecaca;border-radius:20px;padding:3px 5px 3px 9px;
  gap:4px;
}
.consec-name{font-size:12px;font-weight:600;color:#9b2c2c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.consec-badge{color:#fff;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;flex-shrink:0;line-height:1.4}

/* HISTORY LIST */
.history-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);gap:8px;
}
.history-row:last-child{border-bottom:none}
.history-date{font-size:13px;color:var(--text);flex-shrink:0}
.history-right{display:flex;align-items:center;gap:8px}


/* EMPTY / SPINNER */
.empty{text-align:center;color:var(--muted);padding:32px 0;font-size:13px}
.spinner{display:flex;justify-content:center;align-items:center;height:100px}
.spinner::after{
  content:'';width:28px;height:28px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--blue);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* MESSAGE INBOX */
.inbox-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .2s ease;
  -webkit-backdrop-filter:blur(0);
}
.inbox-overlay.open{opacity:1;pointer-events:all}
.inbox-sheet{
  background:#fff;border-radius:20px 20px 0 0;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom));
  width:100%;max-width:520px;max-height:80vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.32,.72,0,1);
  will-change:transform;
  -webkit-overflow-scrolling:touch;
}
.inbox-overlay.open .inbox-sheet{transform:translateY(0)}
.inbox-handle{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 14px}
.inbox-title{font-size:15px;font-weight:700;color:#0f2044;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.inbox-compose textarea{
  width:100%;min-height:80px;padding:10px 12px;
  border:1px solid #e2e8f0;border-radius:10px;
  font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;margin-bottom:8px;
}
.inbox-send-btn{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#0f2044,#1a3a7a);
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
}
.inbox-divider{border:none;border-top:1px solid #e2e8f0;margin:12px 0}
.inbox-section-title{font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.inbox-item{
  background:#f7f9fc;border-radius:10px;padding:10px 12px;margin-bottom:7px;
}
.inbox-item.unread{background:#fffbeb;border-left:3px solid #c9a84c}
.inbox-item-meta{font-size:11px;color:#718096;margin-bottom:3px;display:flex;justify-content:space-between}
.inbox-item-text{font-size:13px;color:#1a202c;line-height:1.5}
.inbox-empty{font-size:12px;color:#718096;text-align:center;padding:20px 0}
/* HEADER BADGE */
.hdr-btn-wrap{position:relative;display:inline-flex}
.hdr-badge{
  position:absolute;top:-4px;right:-4px;
  background:#e53e3e;color:#fff;border-radius:50%;
  width:16px;height:16px;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}

/* TOAST */
.toast{
  position:fixed;top:calc(16px + env(safe-area-inset-top, 0px));left:50%;transform:translateX(-50%);
  background:#1a202c;color:#fff;padding:9px 18px;border-radius:22px;
  font-size:13px;font-weight:500;z-index:9999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}

/* ── 넓은 폰 세로 (480px-767px): Galaxy S Ultra, Pixel Pro, iPhone Pro Max ── */
@media (min-width: 480px) and (max-width: 767px) {
  .content { padding: var(--sp) 24px calc(16px + var(--safe-bottom)); }
  /* 480px+: auto-fill 유지 (기본값), 명시적 override 불필요 */
}

/* ── 폰 가로 (600px+, 높이 499px 이하): Galaxy S 가로, iPhone Pro 가로 ── */
/* 넓은 화면이지만 짧음 → 탭 레이아웃 없이 2열 카드만 적용 */
@media (min-width: 600px) and (max-height: 499px) {
  .content { padding: var(--sp) 20px calc(12px + var(--safe-bottom)); }
  .tab-panel.active {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; align-items: start;
  }
  .tab-panel.active > .card:first-child { grid-column: 1 / -1; }
  .tab-panel.active > .card:last-child  { grid-column: 1 / -1; }
  .name-chips  { grid-template-columns: repeat(6, 1fr); }
  .consec-list { grid-template-columns: repeat(4, 1fr); }
}

/* ── TABLET / iPad (768px+, 높이 500px 이상) — 폰 가로 제외, 2열 카드 그리드 ── */
@media (min-width: 768px) and (min-height: 500px) {
  .content { padding: var(--sp) 40px calc(16px + var(--safe-bottom)); max-width: 960px; }
  /* 탭 버튼: 밑줄 스타일로 (흰 박스 제거) */
  .header-tabs { gap: 0; background: none; padding: 0; border-radius: 0; border-top: 1px solid rgba(255,255,255,0.1); }
  .h-tab { flex: 1; font-size: 13px; padding: 10px 8px; border-radius: 0; border-bottom: 3px solid transparent; }
  .h-tab.active { background: rgba(255,255,255,0.08); color: white; border-bottom-color: var(--gold); }

  /* 활성 패널: 카드 2열 그리드 */
  .tab-panel.active {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }
  /* 요약(1번)·월별분석(4번)·기록(마지막) → 전체폭 */
  .tab-panel.active > .card:first-child  { grid-column: 1 / -1; }
  .tab-panel.active > .card:nth-child(4) { grid-column: 1 / -1; }
  .tab-panel.active > .card:last-child   { grid-column: 1 / -1; }

  /* 연속결석(2번)·8주추이(3번): 같은 높이로 */
  .tab-panel.active > .card:nth-child(2),
  .tab-panel.active > .card:nth-child(3) { align-self: stretch; }

  /* .name-chips: flex-wrap 방식으로 자동 조정 (grid override 불필요) */
  .consec-list { grid-template-columns: repeat(3, 1fr); } /* 세로: 3열 */
  .ma-bar-bg { height: 22px; }
  .chart-bar-bg { height: 20px; }
}

/* ── 태블릿 가로 소형 (768px~1099px, min-height 500px) — iPad 9.7" 가로 등 ── */
/* min-height: 500px 으로 폰 가로(≈430px 이하) 제외 */
@media (min-width: 768px) and (max-width: 1099px) and (orientation: landscape) and (min-height: 500px) {
  .consec-list { grid-template-columns: repeat(4, 1fr); } /* 태블릿 가로: 4열 */
}

/* ── WIDE TABLET / iPad 가로 · Pro (1100px+) — 3패널 동시 표시 ── */
@media (min-width: 1100px) {
  .content {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    max-width: 1600px;
    align-items: start;
    padding: var(--sp) 40px calc(16px + var(--safe-bottom));
  }

  /* 3패널 모두 표시 */
  .tab-panel { display: block !important; }
  .tab-panel.active { display: block !important; }

  /* 패널 제목 (::before 로 자동 삽입) */
  .tab-panel[data-label]::before {
    content: attr(data-label);
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    padding-bottom: 10px;
    margin-bottom: 8px;
    border-bottom: 2px solid var(--blue);
  }

  /* 로딩 스피너: 3열 전체폭 */
  #loadingSpinner { grid-column: 1 / -1; }

  /* 패널 내부 카드: 단일 컬럼 (패널이 이미 나란히 배치되므로) */
  .tab-panel > .card { width: 100%; }

  /* .name-chips: flex-wrap 방식으로 패널 폭에 맞게 자동 조정 */
  .consec-list { grid-template-columns: repeat(3, 1fr); }

  /* 3패널 모드: 패널 제목(::before)이 이미 표시 → 탭바 중복, 숨김 */
  .header-tabs { display: none; }

  /* 하단 메모 패널: 3열 전체폭 */
  .memo-panel {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
}

/* 메모 패널: 모바일 기본 */
.memo-panel {
  margin-top: 4px;
}
.memo-panel .card { width: 100%; }
.memo-card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.memo-card-icon {
  font-size: 14px;
  margin-right: 4px;
}
.memo-card-body {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.memo-empty {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
</style>
</head>
<body>

<div class="header">
  <!-- 항상 표시: 타이틀(컴팩트 시 부서명) + 버튼 -->
  <div class="header-bar">
    <span class="header-bar-title" id="headerBarTitle">⛪ 사역 현황</span>
    <div class="header-actions">
      <button class="hdr-btn" id="btnInstall" onclick="installPWA()" style="display:none">📲</button>
      <button class="hdr-btn" id="btnFCMRegister" onclick="initFCM(true)" title="알림 등록" style="opacity:0.5"><i data-lucide="bell"></i></button>
      <div class="hdr-btn-wrap">
        <button class="hdr-btn" onclick="openInbox()"><i data-lucide="message-circle"></i></button>
        <span class="hdr-badge" id="viewerInboxBadge" style="display:none">0</span>
      </div>
      <button class="hdr-btn" onclick="loadData(true)"><i data-lucide="refresh-cw"></i></button>
    </div>
  </div>
  <!-- 컴팩트 시 숨겨지는 부제목 -->
  <div class="header-sub">연천장로교회 교역자 주일 보고 <span id="viewerVerLabel" style="font-size:10px;opacity:0.5"></span></div>
  <!-- 탭: 항상 표시 -->
  <div class="header-tabs">
    <button class="h-tab active" id="tab-youth" onclick="switchTab('youth')">중고등부</button>
    <button class="h-tab"        id="tab-young" onclick="switchTab('young')">청년부</button>
    <button class="h-tab"        id="tab-adult" onclick="switchTab('adult')">장년</button>
  </div>
</div>

<div class="content">
  <div id="panel-youth" class="tab-panel active" data-label="🎓 중고등부"></div>
  <div id="panel-young" class="tab-panel" data-label="🙏 청년부"></div>
  <div id="panel-adult" class="tab-panel" data-label="⛪ 장년"></div>
  <div id="loadingSpinner"><div class="spinner"></div></div>
  <div id="panel-memo" class="memo-panel"></div>
</div>

<div class="toast" id="toast"></div>

<!-- INBOX MODAL -->
<div class="inbox-overlay" id="inboxOverlay" onclick="closeInbox(event)">
  <div class="inbox-sheet">
    <div class="inbox-handle"></div>
    <!-- 타이틀 + 닫기 버튼 -->
    <div class="inbox-title">
      💬 메시지함
      <button onclick="document.getElementById('inboxOverlay').classList.remove('open')"
        style="margin-left:auto;background:none;border:none;font-size:18px;color:#a0aec0;cursor:pointer;line-height:1;padding:0 2px">✕</button>
    </div>

    <!-- 지시사항 작성 -->

let _instrList = [];

function openInbox() {

  viewerUnread = 0;

function closeInbox(e) {

function loadInboxData() {

function renderNotifList() {
  const el = document.getElementById('notifList');
  if (!el) return;
  if (!_notifList.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; return; }
  const lastSeenIdx = _notifList.findIndex(x => x.id === viewerLastNotifId);
  el.innerHTML = _notifList.slice().reverse().map(n => {
    const idx = _notifList.indexOf(n);
    const isUnread = lastSeenIdx === -1 || idx > lastSeenIdx;
    return `
    <div class="inbox-item ${isUnread ? 'unread' : ''}">
      <div class="inbox-item-meta"><span>${n.date}</span><span>${n.reporter || ''}</span></div>
      <div class="inbox-item-text">📄 ${n.title}</div>
    </div>`;
  }).join('');
}

function renderInstrList() {
  const el = document.getElementById('instrList');
  if (!el) return;
  if (!_instrList.length) { el.innerHTML = '<div class="inbox-empty">없음</div>'; return; }
  el.innerHTML = _instrList.slice().reverse().map(i => `
    <div class="inbox-item">
      <div class="inbox-item-meta">
        <span>${i.date}</span>
        <button onclick="deleteInstruction('${i._key}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#e53e3e;padding:0">🗑️</button>

      <div class="inbox-item-text">${i.text.replace(/\n/g,'<br>')}</div>

}

async function deleteInstruction(key) {
  // Firebase RTDB에서 즉시 삭제 → onValue 리스너가 자동으로 UI 갱신
  try {
    await db.ref('instructions/' + key).remove();
    toast('🗑️ 삭제 완료');
  } catch(e) {
    toast('❌ 삭제 실패: ' + e.message);
  }
}

async function sendInstruction() {
  const text = document.getElementById('instrText').value.trim();
  if (!text) { toast('내용을 입력하세요'); return; }
  try {
    toast('⏳ 전송 중...');
    const now = new Date();
    const item = {
      id:   now.toISOString(),
      date: now.toLocaleString('ko-KR', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}),
      text
    };
    // Firebase RTDB에 push → onValue 리스너가 자동으로 UI 갱신
    await db.ref('instructions').push(item);
    document.getElementById('instrText').value = '';
    toast('✅ 지시사항 전송 완료');
    getTargetFCMToken('reportApp').then(tok => {
      if(tok) sendFCMPush(tok, '📋 새 지시사항', text.substring(0, 60));
    });
  } catch(e) { toast('❌ 전송 실패: ' + e.message); }
}

// Firebase RTDB 실시간 리스너 시작
function startRTDBListeners() {
  // 지시사항 리스너
  db.ref('instructions').on('value', snap => {
    const data = snap.val() || {};
    _instrList = Object.entries(data)
      .map(([k, v]) => ({ ...v, _key: k }))
      .sort((a, b) => a.id.localeCompare(b.id));
    renderInstrList();
  });

  // 보고서 알림 리스너
  db.ref('notifications').on('value', snap => {
    const data = snap.val() || {};
    const list = Object.entries(data)
      .map(([k, v]) => ({ ...v, _key: k }))
      .sort((a, b) => a.id.localeCompare(b.id));

    // 새 알림 감지
    if (list.length) {
      const latest = list[list.length - 1];
      if (latest.id !== viewerLastNotifId) {
        viewerUnread++;
        const badge = document.getElementById('viewerInboxBadge');
        if (badge) { badge.style.display = 'flex'; badge.textContent = viewerUnread; }
        toast('📄 새 보고서가 도착했습니다');
        if (Notification.permission === 'granted') {
          new Notification('📄 새 보고서 도착', { body: latest.title, icon: './notification-icon.png' });
        }
        viewerLastNotifId = latest.id;
        localStorage.setItem('viewerLastNotifId', latest.id);
      }
    }

    _notifList = list;
    // 인박스가 열려 있으면 즉시 렌더링
    if (document.getElementById('inboxOverlay')?.classList.contains('open')) {
      renderNotifList();
    }
  });
}

/* ── FCM: PEM → ArrayBuffer ── */
function pemToArrayBuffer(pem) {
  const b64 = pem.replace(/-----[A-Z ]+-----/g,'').replace(/\s/g,'');
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}

/* ── FCM: 서비스 계정 JWT → OAuth2 액세스 토큰 ── */
let _fcmAccessToken = null, _fcmTokenExpiry = 0;
async function getFCMAccessToken() {
  if(_fcmAccessToken && Date.now() < _fcmTokenExpiry) return _fcmAccessToken;
  const now = Math.floor(Date.now()/1000);
  function b64u(str){ return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
  const hdr = b64u(JSON.stringify({alg:'RS256',typ:'JWT'}));
  const pld = b64u(JSON.stringify({
    iss:FCM_SA_EMAIL,
    scope:'https://www.googleapis.com/auth/firebase.messaging',
    aud:'https://oauth2.googleapis.com/token',
    exp:now+3600, iat:now
  }));
  const signing = `${hdr}.${pld}`;
  const key = await crypto.subtle.importKey(
    'pkcs8', pemToArrayBuffer(FCM_SA_KEY),
    {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'}, false, ['sign']
  );
  const sig = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(signing));
  const sigB64u = btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const jwt = `${signing}.${sigB64u}`;
  const res = await fetch('https://oauth2.googleapis.com/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  _fcmAccessToken = data.access_token;
  _fcmTokenExpiry = Date.now() + 55 * 60 * 1000;
  return _fcmAccessToken;
}

/* ── FCM: 알림 발송 ── */
async function sendFCMPush(targetToken, title, body) {
  if(!targetToken) return;
  try {
    const at = await getFCMAccessToken();
    const res = await fetch('https://fcm.googleapis.com/v1/projects/yeoncheon-church/messages:send',{
      method:'POST',
      headers:{'Authorization':`Bearer ${at}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:{
        token:targetToken,
        data:{title,body},
        webpush:{headers:{TTL:'86400'}}
      }})
    });
    if(!res.ok) console.warn('FCM send error', await res.json());
  } catch(e){ console.warn('FCM push failed',e); }
}

/* ── FCM: 토큰 DB 저장 ── */
async function saveFCMTokenToDB(role, fcmToken) {

async function initFCM(manual = false) {
  if(!('Notification' in window)) {
    if(manual) toast('❌ 이 브라우저는 알림을 지원하지 않습니다');
    return;
  }
  // 권한 요청
  let perm = Notification.permission;
  if(perm === 'default') perm = await Notification.requestPermission();
  if(perm !== 'granted') {
    if(manual) toast('❌ 알림 권한이 거부됐습니다. 브라우저 설정에서 허용해 주세요.');
    updateFCMStatusUI();
    return;
  }
  if(manual) toast('🔔 알림 등록 중...');
  try {
    const messaging = firebase.messaging();
    const reg = await navigator.serviceWorker.ready;
    const token = await messaging.getToken({vapidKey:FCM_VAPID, serviceWorkerRegistration:reg});
    if(!token) throw new Error('토큰 발급 실패');

    localStorage.setItem('fcmToken_viewerApp', token);
    const saveOk = await saveFCMTokenToDB('viewerApp', token);
    if(saveOk) {
      if(manual) toast('✅ 알림 등록 완료');
    } else {
      if(manual) toast('⚠️ 토큰 저장 실패 — 잠시 후 다시 시도하세요');
    }
    updateFCMStatusUI();

    // 포그라운드 메시지 수신
    if(!window._fcmOnMessageSet) {
      window._fcmOnMessageSet = true;
      messaging.onMessage(payload => {
        const t = payload.data?.title || payload.notification?.title || '알림';
        const b = payload.data?.body  || payload.notification?.body  || '';
        toast(`🔔 ${t}: ${b}`, 4000);
      });
    }
  } catch(e) {
    console.warn('FCM init failed', e);
    if(manual) toast('❌ 알림 등록 실패: ' + e.message);
    updateFCMStatusUI();
  }
}

function updateFCMStatusUI() {
  const btn = document.getElementById('btnFCMRegister');
  if(!btn) return;
  const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
  const hasToken = !!localStorage.getItem('fcmToken_viewerApp');
  const bellIcon = '<i data-lucide="bell"></i>';
  const bellOffIcon = '<i data-lucide="bell-off"></i>';
  if(perm === 'granted' && hasToken) {
    btn.innerHTML = bellIcon; btn.title = '알림 등록됨';
    btn.style.opacity = '1';
  } else if(perm === 'denied') {
    btn.innerHTML = bellOffIcon; btn.title = '알림 권한 거부됨';
    btn.style.opacity = '0.6';
  } else {
    btn.innerHTML = bellIcon; btn.title = '알림 미등록 — 탭해서 등록';
    btn.style.opacity = '0.5';
  }
  lucide.createIcons({ nodes: [btn] });
}

});

<script>
const DATA_URL = RAW_BASE + '/history.json';
const VIEWER_VERSION = '0.9.2';
let allData = [];
let activeTab = 'youth';


/* ── TOAST ── */
function toast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}


/* ── HELPERS ── */
function rateClass(r) {
  return r >= 70 ? 'rate-good' : r >= 50 ? 'rate-mid' : 'rate-low';
}
function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
}
function fmtShort(d) {
  if (!d) return '';
  const [, m, day] = d.split('-');
  return `${parseInt(m)}/${parseInt(day)}`;
}

/* ── 월별 집계 (주평균 출석률) ── */
function monthSummary(data, group) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    const g = row[group];
    if (!g || !g.total) return;
    if (!map[key]) map[key] = { rateSum: 0, weeks: 0, members: 0 };
    map[key].rateSum  += Math.round(g.present / g.total * 100);
    map[key].members   = Math.max(map[key].members, g.total);
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      rate:  Math.round(v.rateSum / v.weeks),   // 주평균 출석률
      weeks: v.weeks,
      members: v.members
    }));
}

function adultMonthSummary(data) {
  const map = {};
  data.forEach(row => {
    const [y, m] = row.date.split('-');
    const key = `${y}-${m}`;
    if (!map[key]) map[key] = { absent: 0, weeks: 0 };
    map[key].absent += (row.adult || {}).absent || 0;
    map[key].weeks++;
  });
  return Object.entries(map)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([key, v]) => ({
      label: `${parseInt(key.split('-')[1])}월`,
      absent: v.absent,
      weeks:  v.weeks,
      avg:    v.weeks ? Math.round(v.absent / v.weeks * 10) / 10 : 0
    }));
}

/* ── 연속 결석 ── */
function calcConsecAbsent(data, group) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row[group] || {}).absentNames || []);
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function calcAdultConsec(data) {
  const streak = {};
  data.forEach(row => {
    const names = new Set((row.adult?.zones || []).flatMap(z => z.names));
    const all   = new Set([...Object.keys(streak), ...names]);
    all.forEach(n => {
      streak[n] = names.has(n) ? (streak[n] || 0) + 1 : 0;
    });
  });
  return Object.entries(streak)
    .filter(([, v]) => v >= 2)
    .sort((a, b) => b[1] - a[1])
    .map(([name, weeks]) => ({ name, weeks }));
}
function consecBadgeColor(weeks, maxWeeks) {
  // 2주=노랑, maxWeeks=빨강 그라데이션
  const ratio = maxWeeks > 2 ? Math.min((weeks - 2) / (maxWeeks - 2), 1) : 1;
  const hue   = Math.round(48 * (1 - ratio));      // 48=노랑 → 0=빨강
  const sat   = Math.round(88 + ratio * 10);
  const light = Math.round(52 - ratio * 14);
  return `hsl(${hue},${sat}%,${light}%)`;
}
function renderConsecBlock(list) {
  if (!list.length) return `<div style="font-size:12px;color:var(--muted)">연속 결석자 없음</div>`;
  const maxWeeks = list[0].weeks; // 이미 내림차순 정렬됨
  return `<div class="consec-list">${list.map(({name, weeks}) => {
    const bg = consecBadgeColor(weeks, maxWeeks);
    return `<div class="consec-row"><span class="consec-name">${name}</span><span class="consec-badge" style="background:${bg}">${weeks}주</span></div>`;
  }).join('')}</div>`;
}


/* ── 월별 분석 렌더 ── */
function renderMonthBar(months, barClass, metaFn) {
  if (!months.length) return '<div style="font-size:12px;color:var(--muted)">데이터 없음</div>';
  return `<div class="monthly-analysis">${months.map(m => {
    const w = m.rate ?? Math.round(m.absent / Math.max(...months.map(x => x.absent), 1) * 100);
    return `<div class="ma-row">
      <div class="ma-label">${m.label}</div>
      <div class="ma-bar-bg">
        <div class="ma-bar ${barClass}" style="width:${Math.max(w, 10)}%">${m.rate !== undefined ? m.rate + '%' : m.absent + '명'}</div>
      </div>
      <div class="ma-meta">${metaFn(m)}</div>
    </div>`;
  }).join('')}</div>`;
}

/* ── 중고등부 / 청년부 패널 ── */
function renderGroupPanel(group) {
  const el     = document.getElementById(`panel-${group}`);
  if (!allData.length) { el.innerHTML = '<div class="empty">데이터가 없습니다</div>'; return; }
  const bar    = group === 'youth' ? 'bar-youth'       : 'bar-young';
  const maBar  = group === 'youth' ? 'ma-bar-youth'    : 'ma-bar-young';
  const latest = allData[allData.length - 1];
  const gData  = latest[group] || {};
  const rate   = gData.total ? Math.round(gData.present / gData.total * 100) : 0;
  const absent = gData.absentNames || [];
  const recent = allData.slice(-8);
  const months = monthSummary(allData, group);
  const consec = calcConsecAbsent(allData, group);
  el.innerHTML = `
    <div class="card">
      <div class="card-title">
        <span>📅 ${fmtDate(latest.date)}</span>
        <span class="badge-rate ${rateClass(rate)}">출석률 ${rate}%</span>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="stat-label">출석</div><div class="stat-valrow"><span class="stat-val" style="color:#2c7be5">${gData.present ?? '-'}</span><span class="stat-sub">명</span></div></div>
        <div class="stat-box"><div class="stat-label">결석</div><div class="stat-valrow"><span class="stat-val" style="color:#e53e3e">${gData.absent ?? '-'}</span><span class="stat-sub">명</span></div></div>
        <div class="stat-box"><div class="stat-label">전체</div><div class="stat-valrow"><span class="stat-val">${gData.total ?? '-'}</span><span class="stat-sub">명</span></div></div>
      </div>
      <div class="absent-block">
        <div class="absent-block-title">결석자</div>
        <div class="name-chips">
          ${absent.length ? absent.map(n => `<span class="name-chip">${n}</span>`).join('') : '<span class="name-chip none">결석자 없음</span>'}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔴 연속 결석</div>
      ${renderConsecBlock(consec)}
    </div>

    <div class="card">
      <div class="card-title">📊 최근 8주 추이</div>
      <div class="chart-wrap">${recent.map(row => {
        const g = row[group] || {};
        const w = g.total ? Math.round(g.present / g.total * 100) : 0;
        return `<div class="chart-row"><div class="chart-label">${fmtShort(row.date)}</div><div class="chart-bar-bg"><div class="chart-bar ${bar}" style="width:${w}%">${w}%</div></div></div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📅 월별 평균 출석률</div>
      ${renderMonthBar(months, maBar, m => `${m.weeks}주 기록`)}
    </div>

    <div class="card">
      <div class="card-title">📋 전체 주일 기록</div>
      ${allData.slice().reverse().map(row => {
        const g = row[group] || {};
        const r = g.total ? Math.round(g.present / g.total * 100) : 0;
        return `<div class="history-row">
          <div class="history-date">${fmtDate(row.date)}</div>
          <div class="history-right">
            <span style="font-size:12px;color:var(--muted)">${g.present ?? '-'}/${g.total ?? '-'}명</span>
            <span class="badge-rate ${rateClass(r)}" style="font-size:10px">${r}%</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── 구역장 이름 맵 (1~12구역) ── */
const ZONE_LEADER_MAP = {
  '1구역':'이명숙','2구역':'민옥화','3구역':'임미자','4구역':'임혜진',
  '5구역':'오민자','6구역':'김순이','7구역':'이정순','8구역':'김영숙',
  '9구역':'양경순','10구역':'조옥희','11구역':'최숙녀','12구역':'유은희'
};

/* ── 장년 패널 ── */
function renderAdultPanel() {
  const el = document.getElementById('panel-adult');
  if (!allData.length) { el.innerHTML = '<div class="empty">데이터가 없습니다</div>'; return; }

  const latest = allData[allData.length - 1];
  const adult  = latest.adult || {};
  const zones  = adult.zones || [];
  const d1 = zones.filter(z => parseInt(z.zone) <= 6);
  const d2 = zones.filter(z => parseInt(z.zone) >= 7);

  const buildZoneRows = list =>
    list.length
      ? list.map(z => `<div class="zone-row">
          <div class="zone-name"><span class="zone-num">${z.zone}</span><span class="zone-leader-name">${ZONE_LEADER_MAP[z.zone]||''}</span></div>
          <div class="zone-names-wrap">${z.names.map(n => `<span class="name-chip">${n}</span>`).join('')}</div>
          <span class="zone-count">${z.names.length}명</span>
        </div>`).join('')
      : '<div style="font-size:12px;color:var(--muted);padding:4px 0">결석자 없음</div>';

  const recent    = allData.slice(-8);
  const maxAbsent = Math.max(...recent.map(r => (r.adult || {}).absent || 0), 1);
  const months    = adultMonthSummary(allData);
  const maxMonthAbsent = Math.max(...months.map(m => m.absent), 1);

  el.innerHTML = `
    <div class="card">
      <div class="card-title">
        <span>📅 ${fmtDate(latest.date)}</span>
        <span style="font-size:12px;font-weight:700;color:#e53e3e;background:#fff5f5;padding:2px 8px;border-radius:20px">결석 ${adult.absent ?? '-'}명</span>
      </div>
      ${!d1.length && !d2.length ? '<div class="empty" style="padding:12px 0">결석자 없음</div>' : ''}
      ${d1.length ? `<div class="district-title">1교구 (1~6구역) · 교구장 이명숙</div><div class="zone-absent-list">${buildZoneRows(d1)}</div>` : ''}
      ${d2.length ? `<div class="district-title" style="margin-top:${d1.length?'12px':'0'}">2교구 (7~12구역) · 교구장 이정순</div><div class="zone-absent-list">${buildZoneRows(d2)}</div>` : ''}
    </div>

    <div class="card">
      <div class="card-title">🔴 연속 결석</div>
      ${renderConsecBlock(calcAdultConsec(allData))}
    </div>

    <div class="card">
      <div class="card-title">📊 최근 8주 결석 추이</div>
      <div class="chart-wrap">${recent.map(row => {
        const a   = row.adult || {};
        const cnt = a.absent || 0;
        const w   = Math.round(cnt / maxAbsent * 100);
        return `<div class="chart-row"><div class="chart-label">${fmtShort(row.date)}</div><div class="chart-bar-bg"><div class="chart-bar bar-adult" style="width:${Math.max(w,8)}%">${cnt}명</div></div></div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📅 월별 결석 분석</div>
      <div class="monthly-analysis">${months.map(m => {
        const maxAvg = Math.max(...months.map(x => x.avg), 1);
        const w = Math.round(m.avg / maxAvg * 100);
        return `<div class="ma-row">
          <div class="ma-label">${m.label}</div>
          <div class="ma-bar-bg"><div class="ma-bar ma-bar-adult" style="width:${Math.max(w,10)}%">주평균 ${m.avg}명</div></div>
          <div class="ma-meta">${m.weeks}주</div>
        </div>`;
      }).join('')}</div>
    </div>

    <div class="card">
      <div class="card-title">📋 전체 주일 기록</div>
      ${allData.slice().reverse().map(row => {
        const a = row.adult || {};
        return `<div class="history-row">
          <div class="history-date">${fmtDate(row.date)}</div>
          <div class="history-right">
            <span style="font-size:13px;font-weight:600;color:#e53e3e">${a.absent ?? '-'}명 결석</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── TAB NAMES ── */
const TAB_NAMES = { youth: '중고등부', young: '청년부', adult: '장년' };

/* ── SWITCH TAB ── */
function switchTab(tab) {
  activeTab = tab;
  ['youth','young','adult'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
  // 컴팩트 상태면 타이틀도 교체
  const hdr = document.querySelector('.header');
  const title = document.getElementById('headerBarTitle');
  if (hdr.classList.contains('compact')) title.textContent = TAB_NAMES[tab];
}

/* ── RENDER ── */
function renderMemoPanel() {
  const el = document.getElementById('panel-memo');
  const latest = allData.length ? allData[allData.length - 1] : null;
  if (!latest) { el.innerHTML = ''; return; }

  const items = [
    { icon: '📋', label: '차주 사역계획', key: 'nextWeekPlan' },
    { icon: '🙏', label: '기도제목',      key: 'prayer' },
    { icon: '💬', label: '종합 의견 및 건의사항', key: 'generalOpinion' }
  ];

  el.innerHTML = items.map(({ icon, label, key }) => {
    const val = (latest[key] || '').trim();
    return `<div class="card">
      <div class="memo-card-title"><span class="memo-card-icon">${icon}</span>${label}</div>
      ${val
        ? `<div class="memo-card-body">${val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
        : `<div class="memo-empty">내용 없음</div>`}
    </div>`;
  }).join('');
}

function render() {
  renderGroupPanel('youth');
  renderGroupPanel('young');
  renderAdultPanel();
  renderMemoPanel();
}

/* ── LOAD ── */
async function loadData(showMsg = false) {
  document.getElementById('loadingSpinner').style.display = 'block';
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('서버 오류 ' + res.status);
    allData = await res.json();
    allData.sort((a, b) => a.date.localeCompare(b.date));
    render();
    if (showMsg) toast('✅ 최신 데이터로 업데이트');
  } catch(e) {
    ['youth','young','adult'].forEach(t => {
      document.getElementById(`panel-${t}`).innerHTML =
        `<div class="empty">데이터를 불러오지 못했습니다<br><small>${e.message}</small></div>`;
    });
  } finally {
    document.getElementById('loadingSpinner').style.display = 'none';
  }
}

loadData();

// 버전 표시
const vEl = document.getElementById('viewerVerLabel');
if (vEl) vEl.textContent = `v${VIEWER_VERSION}`;
lucide.createIcons();

/* ── SWIPE ── */
const TABS = ['youth','young','adult'];
let _tx = 0, _ty = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _tx;
  const dy = e.changedTouches[0].clientY - _ty;
  if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
  const idx = TABS.indexOf(activeTab);
  if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
  if (dx > 0 && idx > 0)              switchTab(TABS[idx - 1]);
}, { passive: true });

/* ── PWA 설치 프롬프트 ── */
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'block';
});
window.addEventListener('appinstalled', () => {
  _deferredInstallPrompt = null;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'none';
});
function installPWA() {
  if (!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  _deferredInstallPrompt.userChoice.then(() => { _deferredInstallPrompt = null; });
}

/* ── SW 자동 업데이트 감지 ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw-viewer.js', { updateViaCache: 'none' }).then(reg => {
    reg.update(); // 앱 시작 시 항상 최신 SW 체크
    // 새 SW 설치 감지
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          // 새 버전 대기 중 → skipWaiting 요청
          newSW.postMessage('SKIP_WAITING');
        }
      });
    });
  }).catch(() => {});

  // SW 교체 완료 → 자동 리로드
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    toast('🆕 새 버전으로 업데이트 중...', 1500);
    setTimeout(() => location.reload(), 1500);
  });
}

/* ── HEADER COMPACT ON SCROLL ── */
(function(){
  const hdr   = document.querySelector('.header');
  const title = document.getElementById('headerBarTitle');
  let last = 0;
  window.addEventListener('scroll', () => {
    const cur = window.scrollY;
    if (cur > 50 && cur > last) {
      hdr.classList.add('compact');
      title.textContent = TAB_NAMES[activeTab]; // 부서 이름 표시
    } else if (cur < last - 5 || cur < 20) {
      hdr.classList.remove('compact');
      title.textContent = '⛪ 사역 현황';       // 원래 타이틀 복귀
    }
    last = cur;
  }, { passive: true });
})();
</script>
